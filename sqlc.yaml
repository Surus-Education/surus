version: "2"
sql:
  - engine: "postgresql"
    queries: "api/db/queries"
    schema: "api/db/migrations"
    gen:
      go:
        package: "db"
        out: "api/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "text[]"
            go_type:
              type: "[]string"
          - db_type: "jsonb"
            go_type:
              type: "RawMessage"
              import: "encoding/json"
            nullable: true
          - db_type: "numeric"
            go_type:
              type: "float64"
            nullable: true
